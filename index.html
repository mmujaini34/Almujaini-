<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>شجرة عائلة محمد بن حميد المجيني</title>

  <style>
    :root{
      --main:#123c69;
      --main2:#2a5d84;
      --gold:#b8924a;
      --bg:#eef2f5;
      --text:#1f2937;
      --muted:#5f6b7a;
      --card:rgba(255,255,255,0.95);
      --line:#d7e0e8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 14px;
      background: var(--bg);
      font-family: Tahoma, Arial, sans-serif;
      color: var(--text);
      position: relative;
      overflow-x: hidden;
    }

    body::before{
      content:"";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(rgba(255,255,255,0.82), rgba(255,255,255,0.82)),
        url("./bg-mujaini.jpg") center center / cover no-repeat;
      opacity: 0.42;
      pointer-events: none;
      z-index: -1;
    }

    .box {
      max-width: 1020px;
      margin: auto;
    }

    .header {
      background: linear-gradient(135deg, rgba(18,60,105,0.95), rgba(42,93,132,0.93));
      color: white;
      padding: 24px 18px;
      border-radius: 20px;
      margin-bottom: 14px;
      text-align: center;
      box-shadow: 0 10px 24px rgba(0,0,0,0.08);
      border: 1px solid rgba(255,255,255,0.15);
    }

    .header h1 {
      margin: 0 0 8px 0;
      font-size: 27px;
    }

    .header p {
      margin: 0;
      line-height: 1.95;
      font-size: 14px;
      opacity: 0.98;
    }

    .search-box,
    .title,
    .info-box,
    .footer,
    .about-box {
      background: var(--card);
      backdrop-filter: blur(2px);
    }

    .search-box {
      padding: 12px;
      border-radius: 18px;
      margin-bottom: 12px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.05);
      border: 1px solid var(--line);
    }

    .search-box input {
      width: 100%;
      padding: 14px 14px;
      font-size: 16px;
      border: 1px solid #cfd8e3;
      border-radius: 12px;
      box-sizing: border-box;
      outline: none;
      background: white;
    }

    .search-box input:focus {
      border-color: var(--main);
      box-shadow: 0 0 0 3px rgba(18,60,105,0.08);
    }

    .tools {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }

    .tools button {
      border: none;
      border-radius: 12px;
      padding: 12px;
      background: var(--main);
      color: white;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(18,60,105,0.14);
    }

    .tools button:hover {
      background: var(--main2);
    }

    .title {
      padding: 18px;
      border-radius: 18px;
      margin-bottom: 10px;
      font-size: 22px;
      font-weight: bold;
      color: var(--main);
      text-align: center;
      box-shadow: 0 4px 14px rgba(0,0,0,0.05);
      border: 1px solid var(--line);
    }

    .breadcrumb {
      margin-bottom: 10px;
      text-align: center;
    }

    .breadcrumb button {
      margin: 4px;
      padding: 8px 12px;
      border: none;
      border-radius: 20px;
      background: #e8f0f7;
      color: var(--main);
      cursor: pointer;
      font-size: 13px;
    }

    .info-box {
      padding: 15px;
      border-radius: 18px;
      margin-bottom: 12px;
      line-height: 2;
      border-right: 5px solid var(--gold);
      box-shadow: 0 4px 14px rgba(0,0,0,0.05);
      border-left: 1px solid var(--line);
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(245px, 1fr));
      gap: 12px;
    }

    .card {
      background: rgba(255,255,255,0.96);
      padding: 15px;
      border-radius: 18px;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(0,0,0,0.05);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      border: 1px solid var(--line);
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 22px rgba(0,0,0,0.08);
    }

    .card-has-children {
      border-top: 4px solid var(--main);
    }

    .card-no-children {
      border-top: 4px solid var(--gold);
      background: rgba(252,252,252,0.98);
    }

    .name-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }

    .name {
      font-size: 18px;
      font-weight: bold;
      color: #111827;
      line-height: 1.6;
    }

    .generation-badge {
      flex-shrink: 0;
      font-size: 11px;
      background: #f5ecd9;
      color: #8a6a2b;
      padding: 5px 9px;
      border-radius: 999px;
      white-space: nowrap;
      border: 1px solid #ead9b0;
    }

    .meta {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.9;
    }

    .tag {
      display: inline-block;
      margin-top: 8px;
      padding: 6px 10px;
      border-radius: 20px;
      font-size: 12px;
      background: #edf4fb;
      color: var(--main);
    }

    .about-box {
      padding: 18px;
      border-radius: 18px;
      line-height: 2.1;
      box-shadow: 0 4px 14px rgba(0,0,0,0.05);
      grid-column: 1 / -1;
      border: 1px solid var(--line);
    }

    .about-box h2 {
      color: var(--main);
      margin-top: 0;
      margin-bottom: 12px;
      font-size: 24px;
    }

    .about-box h3 {
      color: var(--gold);
      margin-top: 18px;
      margin-bottom: 8px;
      font-size: 18px;
    }

    .about-box p {
      margin: 0 0 12px 0;
      font-size: 15px;
    }

    .about-box ul {
      margin: 0 0 12px 0;
      padding-right: 20px;
    }

    .about-box li {
      margin-bottom: 6px;
      font-size: 15px;
    }

    .footer {
      padding: 16px;
      border-radius: 18px;
      margin-top: 16px;
      text-align: center;
      line-height: 2;
      box-shadow: 0 4px 14px rgba(0,0,0,0.05);
      border: 1px solid var(--line);
    }

    .footer .line0,
    .footer .line1,
    .footer .line2 {
      color: var(--main);
    }

    .footer .line0 {
      font-size: 15px;
      font-weight: bold;
    }

    .footer .line1 {
      font-size: 18px;
      font-weight: bold;
    }

    .footer .line2 {
      font-size: 14px;
      font-weight: bold;
    }

    @media (max-width: 760px) {
      .tools {
        grid-template-columns: 1fr;
      }

      .name {
        font-size: 16px;
      }

    function normalizeArabic(text) {
      return String(text || "")
        .normalize("NFC")
        .replace(/[أإآ]/g, "ا")
        .replace(/ة/g, "ه")
        .replace(/ى/g, "ي")
        .replace(/ؤ/g, "و")
        .replace(/ئ/g, "ي")
        .replace(/[ًٌٍَُِّْـ]/g, "")
        .replace(/\s+/g, " ")
        .trim()
        .toLowerCase();
    }

    function levenshtein(a, b) {
      a = normalizeArabic(a);
      b = normalizeArabic(b);
      var matrix = [];
      var i, j;

      for (i = 0; i <= b.length; i++) matrix[i] = [i];
      for (j = 0; j <= a.length; j++) matrix[0][j] = j;

      for (i = 1; i <= b.length; i++) {
        for (j = 1; j <= a.length; j++) {
          if (b.charAt(i - 1) === a.charAt(j - 1)) {
            matrix[i][j] = matrix[i - 1][j - 1];
          } else {
            matrix[i][j] = Math.min(
              matrix[i - 1][j - 1] + 1,
              matrix[i][j - 1] + 1,
              matrix[i - 1][j] + 1
            );
          }
        }
      }
      return matrix[b.length][a.length];
    }

    function similarityScore(query, target) {
      query = normalizeArabic(query);
      target = normalizeArabic(target);

      if (!query || !target) return 0;
      if (target.indexOf(query) !== -1) return 100;

      var queryParts = query.split(" ").filter(Boolean);
      var targetParts = target.split(" ").filter(Boolean);

      var partHits = 0;
      for (var i = 0; i < queryParts.length; i++) {
        for (var j = 0; j < targetParts.length; j++) {
          if (
            targetParts[j].indexOf(queryParts[i]) !== -1 ||
            queryParts[i].indexOf(targetParts[j]) !== -1
          ) {
            partHits++;
            break;
          }
        }
      }

      var partScore = (partHits / Math.max(queryParts.length, 1)) * 70;
      var distance = levenshtein(query, target);
      var maxLen = Math.max(query.length, target.length) || 1;
      var editScore = Math.max(0, 30 - (distance / maxLen) * 30);

      return partScore + editScore;
    }

    function hasChildren(id) {
      return people[id] && people[id].children && people[id].children.length > 0;
    }

    function getChildrenCount(id) {
      return people[id] ? people[id].children.length : 0;
    }

    function getDescendantsCount(id) {
      if (!people[id] || !people[id].children) return 0;
      var total = 0;
      for (var i = 0; i < people[id].children.length; i++) {
        var childId = people[id].children[i];
        total += 1 + getDescendantsCount(childId);
      }
      return total;
    }

    function getGeneration(id) {
      function walk(nodeId, depth) {
        if (nodeId === id) return depth;
        var node = people[nodeId];
        if (!node || !node.children) return null;
        for (var i = 0; i < node.children.length; i++) {
          var found = walk(node.children[i], depth + 1);
          if (found !== null) return found;
        }
        return null;
      }
      return walk(rootId, 1) || 1;
    }

    function generationLabelShort(n) {
      return "ج" + n;
    }

    function getLineage(id) {
      var path = [];

      function walk(nodeId, currentPath) {
        var nextPath = currentPath.concat(nodeId);
        if (nodeId === id) {
          path = nextPath;
          return true;
        }
        var node = people[nodeId];
        if (!node || !node.children) return false;
        for (var i = 0; i < node.children.length; i++) {
          if (walk(node.children[i], nextPath)) return true;
        }
        return false;
      }

      walk(rootId, []);
      return path;
    }

    function getLineageText(id) {
      var lineage = getLineage(id);
      var names = [];
      for (var i = 0; i < lineage.length; i++) {
        names.push(people[lineage[i]].name);
      }
      return names.join(" ← ");
    }

    function getCardClass(id) {
      return hasChildren(id) ? "card card-has-children" : "card card-no-children";
    }

    function openWhatsApp(id) {
      var fullLineage = getLineageText(id);
      var message = "السلام عليكم، أرغب في إضافة أو تعديل بيانات في شجرة العائلة بخصوص: " + fullLineage;

      var number = contactNumber.replace(/[^\d]/g, "");
      var waLink = "https://wa.me/" + number + "?text=" + encodeURIComponent(message);
      var fallbackLink = "https://api.whatsapp.com/send?phone=" + number + "&text=" + encodeURIComponent(message);

      var isAndroid = /Android/i.test(navigator.userAgent);

      if (isAndroid) {
        window.location.href = fallbackLink;
      } else {
        window.location.href = waLink;
      }
    }

    function handleClick(id) {
      if (hasChildren(id)) {
        historyStack.push(id);
        currentPerson = id;
        render(id);
      } else {
        var ok = confirm("لا توجد بيانات كافية لهذا الاسم حاليا.\n\nهل تريد فتح واتساب لإضافة أو تعديل البيانات؟");
        if (ok) openWhatsApp(id);
      }
    }

    function renderBreadcrumb() {
      var b = document.getElementById("breadcrumb");
      b.innerHTML = "";

      for (var i = 0; i < historyStack.length; i++) {
        (function(index) {
          var personId = historyStack[index];
          var btn = document.createElement("button");
          btn.innerHTML = people[personId].name;
          btn.onclick = function() {
            historyStack = historyStack.slice(0, index + 1);
            currentPerson = personId;
            render(personId);
          };
          b.appendChild(btn);
        })(i);
      }
    }

    function renderInfoBar(id) {
      var node = people[id];
      var directCount = getChildrenCount(id);
      var descendants = getDescendantsCount(id);
      var lineageText = getLineageText(id);

      var html = "";
      html += '<div class="info-box">';
      html += '<div>عدد الأبناء المباشرين: <strong>' + directCount + '</strong></div>';
      html += '<div>إجمالي الأشخاص تحت هذا الفرع: <strong>' + descendants + '</strong></div>';
      html += '<div>التسلسل: <strong>' + lineageText + '</strong></div>';
      if (node.note) {
        html += '<div>ملاحظة: <strong>' + node.note + '</strong></div>';
      }
      html += '</div>';

      document.getElementById("infoBar").innerHTML = html;
    }

    function render(id) {
      document.getElementById("title").innerHTML = people[id].name;
      renderBreadcrumb();
      renderInfoBar(id);

      var content = document.getElementById("content");
      var children = people[id].children || [];
      var html = "";

      if (children.length === 0) {
        html += '<div class="card card-no-children">';
        html += '<div class="name-row">';
        html += '<div class="name">' + people[id].name + '</div>';
        html += '<div class="generation-badge">' + generationLabelShort(getGeneration(id)) + '</div>';
        html += '</div>';
        html += '<div class="meta">لا توجد أسماء أبناء مسجلة حاليا لهذا الفرع.</div>';
        html += '<div class="tag">لإضافة البيانات يرجى التواصل</div>';
        html += '</div>';
        content.innerHTML = html;
        return;
      }

      for (var i = 0; i < children.length; i++) {
        var childId = children[i];
        var child = people[childId];
        var note = child.note ? "<br><strong>ملاحظة:</strong> " + child.note : "";

        html += '<div class="' + getCardClass(childId) + '" onclick="handleClick(\'' + childId + '\')">';
        html += '<div class="name-row">';
        html += '<div class="name">' + child.name + '</div>';
        html += '<div class="generation-badge">' + generationLabelShort(getGeneration(childId)) + '</div>';
        html += '</div>';
        html += '<div class="meta">عدد الأبناء المباشرين: ' + getChildrenCount(childId) + note + '</div>';
        html += '<div class="meta">إجمالي الأشخاص تحت الفرع: ' + getDescendantsCount(childId) + '</div>';
        html += '<div class="tag">' + (hasChildren(childId) ? "اضغط لعرض الفرع" : "اضغط لطلب الإضافة") + '</div>';
        html += '</div>';
      }

      content.innerHTML = html;
    }

    function goRoot() {
      historyStack = [rootId];
      currentPerson = rootId;
      document.getElementById("searchInput").value = "";
      render(rootId);
    }

    function goBack() {
      if (historyStack.length > 1) {
        historyStack.pop();
        currentPerson = historyStack[historyStack.length - 1];
        render(currentPerson);
      }
    }

    function renderSearchResults(keyword) {
      var results = [];

      for (var key in people) {
        var person = people[key];
        var scoreName = similarityScore(keyword, person.name);
        var scoreNote = similarityScore(keyword, person.note || "");
        var finalScore = Math.max(scoreName, scoreNote);

        if (finalScore >= 35) {
          results.push({ id: key, score: finalScore });
        }
      }

      results.sort(function(a, b) {
        return b.score - a.score;
      });

      document.getElementById("title").innerHTML = "نتائج البحث";
      document.getElementById("breadcrumb").innerHTML = "";

      var infoHtml = '<div class="info-box">عدد النتائج: <strong>' + results.length + '</strong>';
      if (results.length > 0 && results[0].score < 100) {
        infoHtml += '<br>هل تقصد: <strong>' + people[results[0].id].name + '</strong>';
      }
      infoHtml += '</div>';
      document.getElementById("infoBar").innerHTML = infoHtml;

      var html = "";
      if (results.length === 0) {
        html = '<div class="card"><div class="meta">لا توجد نتائج مطابقة.</div></div>';
      } else {
        for (var i = 0; i < results.length; i++) {
          var id = results[i].id;

          html += '<div class="' + getCardClass(id) + '" onclick="' +
            (hasChildren(id)
              ? "handleClick('" + id + "')"
              : "openWhatsApp('" + id + "')") +
            '">';

          html += '<div class="name-row">';
          html += '<div class="name">' + people[id].name + '</div>';
          html += '<div class="generation-badge">' + generationLabelShort(getGeneration(id)) + '</div>';
          html += '</div>';

          html += '<div class="meta">التسلسل: ' + getLineageText(id) + '</div>';
          html += '<div class="meta">عدد الأبناء المباشرين: ' + getChildrenCount(id) + '</div>';
          html += '<div class="meta">درجة التقارب: ' + Math.round(results[i].score) + '%</div>';
          html += '<div class="tag">' + (hasChildren(id) ? "اضغط للدخول" : "اضغط لطلب الإضافة") + '</div>';
          html += '</div>';
        }
      }

      document.getElementById("content").innerHTML = html;
    }

    function showAbout() {
      document.getElementById("title").innerHTML = "نبذة عن قبيلة المجيني";
      document.getElementById("breadcrumb").innerHTML = "";
      document.getElementById("infoBar").innerHTML = "";

      document.getElementById("content").innerHTML = `
        <div class="about-box">
          <h2>تاريخ وأمجاد قبيلة المجيني: أسياد التجارة الدولية وفرضة ودام الساحل</h2>

          <h3>المقدمة والجذور</h3>
          <p>
            تُعد قبيلة المجيني (المجانية) من أعرق القبائل العمانية القحطانية، وينتهي نسبهم إلى قضاعة،
            وهي قبيلة عُرفت تاريخياً بالأنفة، والمروءة، والريادة. وقد شكل المجانية ركناً أساسياً في
            الاستقرار الاجتماعي والسياسي على ساحل الباطنة، متميزين بحكمة الإدارة وسعة الأفق، مما جعلهم
            محل تقدير وثقة عبر الأزمان.
          </p>

          <h3>المعقل والسيادة: ودام الساحل بالمصنعة</h3>
          <p>
            تعتبر ودام الساحل في ولاية المصنعة هي المركز التاريخي والسيادي للقبيلة. ولم تكن ودام مجرد
            حاضرة سكنية، بل كانت "فرضة" تجارية وجمركية رسمية معتمدة من قبل سلاطين عمان؛ حيث كانت السفن
            الدولية تقصدها لتبادل البضائع تحت إشراف وأمن رجال القبيلة، مما جعلها شرياناً اقتصادياً
            حيوياً للدولة ومركزاً لرفع راية السلطنة.
          </p>

          <h3>الإرث الملاحي: رواد التجارة العابرة للقارات</h3>
          <p>برع المجانية في التجارة البحرية البعيدة، وامتلكوا أسطولاً من السفن الكبيرة التي طافت المحيطات. كانت خطوطهم التجارية تصل إلى:</p>
          <ul>
            <li>شرق أفريقيا (زنجبار، ممباسا، لامو): نقلوا الثقافة العمانية والتمور، وعادوا بخيرات أفريقيا من توابل وأخشاب.</li>
            <li>شبه القارة الهندية (بومباي وكراتشي): لاستيراد المنسوجات الفاخرة والأرز.</li>
            <li>الخليج العربي عامة: كانت سفنهم حلقة الوصل بين موانئ البصرة والكويت والمنامة والدمام.</li>
          </ul>

          <h3>أعلام ورموز تاريخية</h3>
          <p>ضمت القبيلة الكثير من الشخصيات البارزة التي أثرت في البلد والمنطقة قديماً وحديثاً، ومن أهم رموزها:</p>
          <ul>
            <li><strong>النوخذه أحمد بن جابر المجيني:</strong> القامة التاريخية والرمز الذي ارتبط اسمه بالوجاهة والتأثير والسيادة. عُرف كنوخذه صاحب اسم رنان ومشهور في "ساحل عمان"، قاد السفن في أصعب الظروف والموانئ الدولية، وكان مرجعاً في القيادة والخبرة البحرية.</li>
            <li><strong>الشيخ علي بن عبدالله المجيني:</strong> الذي يُعد مرجعاً تاريخياً وثقافياً كبيراً، ساهم بحكمته ورؤيته في الحفاظ على موروث القبيلة وتوثيق أمجاد "الفرضة" والنشاط التجاري لودام الساحل.</li>
          </ul>

          <h3>الجيل الحديث: مواصلة العطاء (رجالاً ونساءً)</h3>
          <p>لم يتوقف طموح المجانية عند حدود البحر، بل انتقل مع النهضة المباركة إلى آفاق العلم والعمل، حيث برزت شخصيات حديثة أثرت في مسيرة بناء الوطن:</p>
          <ul>
            <li>في السلك الدبلوماسي والعسكري: يخدم العديد من أبناء القبيلة كقادة وضباط في مختلف الأجهزة العسكرية، وسفراء يمثلون سلطنة عمان بوقار واقتدار.</li>
            <li>في التعليم والطب والهندسة: برزت نساء القبيلة كطبيبات، مهندسات، وأكاديميات، حيث وضعن بصماتهن في التعليم العالي والقطاعات الصحية، مساهمات بفعالية في النهضة الاجتماعية.</li>
            <li>الابتكار وريادة الأعمال: يقود الشباب من آل المجيني اليوم مشاريع تقنية واقتصادية كبرى، محافظين على روح "التاجر الأول" ومواكبين لرؤية عمان المستقبلية.</li>
          </ul>

          <h3>المراجع والاستنادات التاريخية</h3>
          <ul>
            <li>الموسوعة العمانية: المرجع الرسمي لوزارة التراث والثقافة، والذي يوثق نسب القبيلة وتواجدها الراسخ في المصنعة والسويق.</li>
            <li>السجلات الجمركية السلطانية القديمة: التي تثبت اعتماد "ودام الساحل" كفرضة رسمية (ميناء تجاري) للدولة.</li>
            <li>الأرشيف البحري العماني: الذي يحفظ أسماء النواخذة الكبار وأساطيل السفن، ومن ضمنها سفن النوخذه أحمد بن جابر المجيني.</li>
            <li>كتاب "عرب الخليج" (ب. ج. سلوت): الذي يتناول الموانئ التجارية العمانية والرسوم الجمركية وتاريخ "ودام" كمركز نشط.</li>
            <li>الروايات الشفوية والتوثيق الميداني: المستمد من أعيان القبيلة (وعلى رأسهم الشيخ علي بن عبدالله المجيني) والآثار القائمة مثل "حصن ودام الساحل".</li>
          </ul>
        </div>
      `;
    }

    document.getElementById("searchInput").onkeyup = function() {
      var keyword = this.value.trim();
      if (!keyword) {
        render(currentPerson);
        return;
      }
      renderSearchResults(keyword);
    };

    render(rootId);
  </script>
</body>
</html>
