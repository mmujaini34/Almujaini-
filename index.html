    }

    .box {
      max-width: 980px;
      margin: auto;
    }

    .header {
      background: linear-gradient(135deg, #0f4c81, #1f6aa5);
      color: white;
      padding: 22px 18px;
      border-radius: 18px;
      margin-bottom: 14px;
      text-align: center;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    }

    .header h1 {
      margin: 0 0 8px 0;
      font-size: 25px;
    }

    .header p {
      margin: 0;
      line-height: 1.9;
      font-size: 14px;
      opacity: 0.96;
    }

    .search-box {
      background: white;
      padding: 12px;
      border-radius: 16px;
      margin-bottom: 12px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.05);
    }

    .search-box input {
      width: 100%;
      padding: 13px 14px;
      font-size: 16px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      box-sizing: border-box;
      outline: none;
    }

    .search-box input:focus {
      border-color: #0f4c81;
    }

    .tools {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }

    .tools button {
      border: none;
      border-radius: 12px;
      padding: 12px;
      background: #0f4c81;
      color: white;
      font-size: 14px;
      cursor: pointer;
    }

    .tools button.secondary {
      background: #4b5563;
    }

    .title {
      background: white;
      padding: 16px;
      border-radius: 16px;
      margin-bottom: 10px;
      font-size: 21px;
      font-weight: bold;
      color: #0f4c81;
      text-align: center;
      box-shadow: 0 4px 14px rgba(0,0,0,0.05);
    }

    .breadcrumb {
      margin-bottom: 10px;
      text-align: center;
    }

    .breadcrumb button {
      margin: 4px;
      padding: 8px 12px;
      border: none;
      border-radius: 20px;
      background: #dbeafe;
      color: #0f4c81;
      cursor: pointer;
      font-size: 13px;
    }

    .info-box {
      background: white;
      padding: 14px;
      border-radius: 16px;
      margin-bottom: 12px;
      line-height: 2;
      border-right: 5px solid #0f4c81;
      box-shadow: 0 4px 14px rgba(0,0,0,0.05);
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 10px;
    }

    .card {
      background: white;
      padding: 14px;
      border-radius: 16px;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(0,0,0,0.05);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    }

    .card-has-children {
      border-top: 4px solid #0f4c81;
    }

    .card-no-children {
      border-top: 4px solid #9ca3af;
      background: #fcfcfc;
    }

    .name-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }

    .name {
      font-size: 18px;
      font-weight: bold;
      color: #111827;
      line-height: 1.5;
    }

    .generation-badge {
      flex-shrink: 0;
      font-size: 11px;
      background: #eff6ff;
      color: #1d4ed8;
      padding: 5px 9px;
      border-radius: 999px;
      white-space: nowrap;
    }

    .meta {
      font-size: 13px;
      color: #6b7280;
      line-height: 1.8;
    }

    .tag {
      display: inline-block;
      margin-top: 8px;
      padding: 6px 10px;
      border-radius: 20px;
      font-size: 12px;
      background: #eef2ff;
      color: #1d4ed8;
    }

    #treePanel {
      background: white;
      padding: 14px;
      border-radius: 16px;
      margin-top: 12px;
      line-height: 2;
      display: none;
      box-shadow: 0 4px 14px rgba(0,0,0,0.05);
    }

    #treePanel.active {
      display: block;
    }

    #treePanel details {
      margin-bottom: 8px;
      padding-right: 10px;
    }

    #treePanel summary {
      cursor: pointer;
      font-weight: bold;
    }

    .footer {
      background: white;
      padding: 16px;
      border-radius: 16px;
      margin-top: 14px;
      text-align: center;
      line-height: 2;
      box-shadow: 0 4px 14px rgba(0,0,0,0.05);
    }

    .footer .line1,
    .footer .line2 {
      font-size: 16px;
      font-weight: bold;
      color: #0f4c81;
    }

    @media (max-width: 700px) {
      .tools {
        grid-template-columns: repeat(2, 1fr);

    var currentPerson = rootId;
    var historyStack = [rootId];

    function normalizeArabic(text) {
      return String(text || "")
        .replace(/[أإآ]/g, "ا")
        .replace(/ة/g, "ه")
        .replace(/ى/g, "ي")
        .replace(/ؤ/g, "و")
        .replace(/ئ/g, "ي")
        .replace(/\s+/g, " ")
        .trim()
        .toLowerCase();
    }

    function hasChildren(id) {
      return people[id] && people[id].children && people[id].children.length > 0;
    }

    function getChildrenCount(id) {
      return people[id] ? people[id].children.length : 0;
    }

    function getDescendantsCount(id) {
      if (!people[id] || !people[id].children) return 0;
      var total = 0;
      for (var i = 0; i < people[id].children.length; i++) {
        var childId = people[id].children[i];
        total += 1 + getDescendantsCount(childId);
      }
      return total;
    }

    function getGeneration(id) {
      function walk(nodeId, depth) {
        if (nodeId === id) return depth;
        var node = people[nodeId];
        if (!node || !node.children) return null;
        for (var i = 0; i < node.children.length; i++) {
          var found = walk(node.children[i], depth + 1);
          if (found !== null) return found;
        }
        return null;
      }
      return walk(rootId, 1) || 1;
    }

    function generationLabelShort(n) {
      return "ج" + n;
    }

    function getLineage(id) {
      var path = [];

      function walk(nodeId, currentPath) {
        var nextPath = currentPath.concat(nodeId);
        if (nodeId === id) {
          path = nextPath;
          return true;
        }
        var node = people[nodeId];
        if (!node || !node.children) return false;
        for (var i = 0; i < node.children.length; i++) {
          if (walk(node.children[i], nextPath)) return true;
        }
        return false;
      }

      walk(rootId, []);
      return path;
    }

    function getLineageText(id) {
      var lineage = getLineage(id);
      var names = [];
      for (var i = 0; i < lineage.length; i++) {
        names.push(people[lineage[i]].name);
      }
      return names.join(" ← ");
    }

    function getCardClass(id) {
      if (hasChildren(id)) return "card card-has-children";
      return "card card-no-children";
    }

    function openWhatsApp(name) {
      var message = encodeURIComponent("السلام عليكم، أرغب في إضافة أو تعديل بيانات في شجرة العائلة بخصوص: " + name);
      window.location.href = "https://wa.me/" + contactNumber + "?text=" + message;
    }

    function handleClick(id) {
      if (hasChildren(id)) {
        historyStack.push(id);
        currentPerson = id;
        render(id);
      } else {
        var ok = confirm("لا توجد بيانات كافية لهذا الاسم حاليا.\n\nهل تريد فتح واتساب لإضافة أو تعديل البيانات؟");
        if (ok) openWhatsApp(people[id].name);
      }
    }

    function renderBreadcrumb() {
      var b = document.getElementById("breadcrumb");
      b.innerHTML = "";

      for (var i = 0; i < historyStack.length; i++) {
        (function(index) {
          var personId = historyStack[index];
          var btn = document.createElement("button");
          btn.innerHTML = people[personId].name;
          btn.onclick = function() {
            historyStack = historyStack.slice(0, index + 1);
            currentPerson = personId;
            render(personId);
          };
          b.appendChild(btn);
        })(i);
      }
    }

    function renderInfoBar(id) {
      var node = people[id];
      var directCount = getChildrenCount(id);
      var descendants = getDescendantsCount(id);
      var lineageText = getLineageText(id);

      var html = "";
      html += '<div class="info-box">';
      html += '<div>عدد الأبناء المباشرين: <strong>' + directCount + '</strong></div>';
      html += '<div>إجمالي الأشخاص تحت هذا الفرع: <strong>' + descendants + '</strong></div>';
      html += '<div>التسلسل: <strong>' + lineageText + '</strong></div>';
      if (node.note) {
        html += '<div>ملاحظة: <strong>' + node.note + '</strong></div>';
      }
      html += '</div>';

      document.getElementById("infoBar").innerHTML = html;
    }

    function render(id) {
      document.getElementById("title").innerHTML = people[id].name;
      renderBreadcrumb();
      renderInfoBar(id);

      var content = document.getElementById("content");
      var children = people[id].children || [];
      var html = "";

      if (children.length === 0) {
        html += '<div class="card card-no-children">';
        html += '<div class="name-row">';
        html += '<div class="name">' + people[id].name + '</div>';
        html += '<div class="generation-badge">' + generationLabelShort(getGeneration(id)) + '</div>';
        html += '</div>';
        html += '<div class="meta">لا توجد أسماء أبناء مسجلة حاليا لهذا الفرع.</div>';
        html += '<div class="tag">لإضافة البيانات يرجى التواصل</div>';
        html += '</div>';
        content.innerHTML = html;
        return;
      }

      for (var i = 0; i < children.length; i++) {
        var childId = children[i];
        var child = people[childId];
        var directCount = getChildrenCount(childId);
        var descendants = getDescendantsCount(childId);
        var note = child.note ? "<br><strong>ملاحظة:</strong> " + child.note : "";

        html += '<div class="' + getCardClass(childId) + '" onclick="handleClick(\'' + childId + '\')">';
        html += '<div class="name-row">';
        html += '<div class="name">' + child.name + '</div>';
        html += '<div class="generation-badge">' + generationLabelShort(getGeneration(childId)) + '</div>';
        html += '</div>';
        html += '<div class="meta">عدد الأبناء المباشرين: ' + directCount + note + '</div>';
        html += '<div class="meta">إجمالي الأشخاص تحت الفرع: ' + descendants + '</div>';
        html += '<div class="tag">' + (hasChildren(childId) ? "اضغط لعرض الفرع" : "اضغط لطلب الإضافة") + '</div>';
        html += '</div>';
      }

      content.innerHTML = html;
    }

    function goRoot() {
      historyStack = [rootId];
      currentPerson = rootId;
      document.getElementById("searchInput").value = "";
      render(rootId);
    }

    function goBack() {
      if (historyStack.length > 1) {
        historyStack.pop();
        currentPerson = historyStack[historyStack.length - 1];
        render(currentPerson);
      }
    }

    function renderSearchResults(keyword) {
      var normalizedKeyword = normalizeArabic(keyword);
      var results = [];

      for (var key in people) {
        var person = people[key];
        var nameMatch = normalizeArabic(person.name).indexOf(normalizedKeyword) !== -1;
        var noteMatch = normalizeArabic(person.note || "").indexOf(normalizedKeyword) !== -1;
        if (nameMatch || noteMatch) {
          results.push(key);
        }
      }

      document.getElementById("title").innerHTML = "نتائج البحث";
      document.getElementById("breadcrumb").innerHTML = "";
      document.getElementById("infoBar").innerHTML = "";

      var html = "";
      if (results.length === 0) {
        html = '<div class="card"><div class="meta">لا توجد نتائج مطابقة.</div></div>';
      } else {
        for (var i = 0; i < results.length; i++) {
          var id = results[i];
          html += '<div class="' + getCardClass(id) + '" onclick="' + (hasChildren(id) ? "handleClick('" + id + "')" : "openWhatsApp('" + people[id].name.replace(/'/g, "\\'") + "')") + '">';
          html += '<div class="name-row">';
          html += '<div class="name">' + people[id].name + '</div>';
          html += '<div class="generation-badge">' + generationLabelShort(getGeneration(id)) + '</div>';
          html += '</div>';
          html += '<div class="meta">التسلسل: ' + getLineageText(id) + '</div>';
          html += '<div class="meta">عدد الأبناء المباشرين: ' + getChildrenCount(id) + '</div>';
          html += '<div class="meta">إجمالي الأشخاص تحت الفرع: ' + getDescendantsCount(id) + '</div>';
          html += '<div class="tag">' + (hasChildren(id) ? "اضغط للدخول" : "اضغط لطلب الإضافة") + '</div>';
          html += '</div>';
        }
      }

      document.getElementById("content").innerHTML = html;
    }

    function buildFullTree(id) {
      var node = people[id];
      if (!node) return "";

      var html = '<details open>';
      html += '<summary>' + node.name + ' <span style="font-size:11px;color:#2563eb;">(' + generationLabelShort(getGeneration(id)) + ')</span></summary>';

      if (node.children && node.children.length > 0) {
        for (var i = 0; i < node.children.length; i++) {
          html += buildFullTree(node.children[i]);
        }
      }

      html += '</details>';
      return html;
    }

    function openAllTree() {
      var panel = document.getElementById("treePanel");
      panel.innerHTML = buildFullTree(currentPerson);
      panel.classList.add("active");
    }

    function closeAllTree() {
      var panel = document.getElementById("treePanel");
      panel.innerHTML = "";
      panel.classList.remove("active");
    }

    document.getElementById("searchInput").onkeyup = function() {
      var keyword = this.value.trim();
      if (!keyword) {
        render(currentPerson);
        return;
      }
      renderSearchResults(keyword);
    };

    render(rootId);
